apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-briefing-agent
  labels:
    app.kubernetes.io/name: mcp-briefing-agent
    app.kubernetes.io/component: service
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-briefing-agent
      app.kubernetes.io/component: service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-briefing-agent
        app.kubernetes.io/component: service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8787"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: agent
          image: ghcr.io/isaaccavallaro/mcp-briefing-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8787
          envFrom:
            - configMapRef:
                name: mcp-briefing-agent-config
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: run-history
              mountPath: /app/runs
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: run-history
          emptyDir: {}
        - name: tmp
          emptyDir: {}
