services:
  agent:
    build: .
    environment:
      PORT: "8787"
      BRIEFING_SAVE_RUNS: "1"
      BRIEFING_RUN_STORE: postgres
      BRIEFING_RUN_DIR: /app/runs
      DATABASE_URL: postgres://briefing_agent:briefing_agent@postgres:5432/briefing_agent
    ports:
      - "8787:8787"
    volumes:
      - briefing-runs:/app/runs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: briefing_agent
      POSTGRES_USER: briefing_agent
      POSTGRES_PASSWORD: briefing_agent
    ports:
      - "5432:5432"
    volumes:
      - briefing-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U briefing_agent -d briefing_agent"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=2h"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      agent:
        condition: service_healthy

volumes:
  briefing-runs:
  briefing-postgres-data:
